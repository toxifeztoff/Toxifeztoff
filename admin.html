<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - ToxiFezt</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container" id="loginBox">
    <img src="img/logo.png" class="logo" alt="ToxiFezt">
    <p class="subtitulo">Panel de Administración</p>

    <input type="email" id="email" placeholder="Correo admin">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="loginBtn">Iniciar sesión</button>
</div>

<div class="container admin-panel" id="adminBox" style="display:none;">
    <img src="img/logo.png" class="logo" alt="ToxiFezt">
    <p class="subtitulo">Panel Admin</p>

    <div class="dashboard">
        <div class="dash-card">
            <h3>Registrados</h3>
            <h2><span id="total">0</span> / <span id="cuposPanel">70</span></h2>
        </div>
        <div class="dash-card">
            <h3>Disponibles</h3>
            <h2 id="disponibles">70</h2>
        </div>
    </div>

    <div class="progress-wrap">
        <div class="progress-bar" id="barraProgreso"></div>
    </div>

    <div class="config-box">
        <h3>⚙️ Configuración del evento</h3>

        <label>Nombre del evento</label>
        <input type="text" id="nombreEvento" placeholder="Nombre del evento">

        <label>Cupos</label>
        <input type="number" id="cuposEvento" min="1" placeholder="70">

        <label class="switch-line">
            <input type="checkbox" id="eventoActivo">
            Registro activo
        </label>

        <button id="guardarConfigBtn">Guardar configuración</button>
    </div>

    <input type="text" id="buscar" placeholder="Buscar por nombre o Instagram">

    <div class="admin-actions">
        <button id="exportarBtn">📥 Exportar Excel</button>
        <button id="borrarTodosBtn" class="danger">🗑 Borrar todos</button>
    </div>

    <div id="lista"></div>

    <button id="logoutBtn" class="logout">Cerrar sesión</button>
</div>

<div class="modal" id="modalEliminar">
    <div class="modal-content">
        <h2>⚠️ Eliminar registro</h2>
        <p id="textoEliminar">¿Seguro que quieres eliminar este registro?</p>
        <button id="confirmarEliminar" class="danger">Eliminar</button>
        <button id="cancelarEliminar">Cancelar</button>
    </div>
</div>

<div class="modal" id="modalBorrarTodos">
    <div class="modal-content">
        <h2>🚨 Borrar todos</h2>
        <p>Esto eliminará todos los registros del evento actual.</p>
        <p>Esta acción no se puede deshacer.</p>
        <button id="confirmarBorrarTodos" class="danger">Sí, borrar todo</button>
        <button id="cancelarBorrarTodos">Cancelar</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script type="module" src="js/admin.js"></script>

</body>
</html>
