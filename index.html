<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToxiFezt</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <img src="img/logo.png" class="logo" alt="ToxiFezt Logo">

    <p class="subtitulo" id="nombreEventoTexto">Registro Oficial para la Fiesta</p>

    <div class="cupos">
        <h3>Cupos del evento</h3>
        <h1 id="contador">0 / 70</h1>
        <p id="restantes">Cargando lugares...</p>
    </div>

    <form id="registro">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="apellido" placeholder="Apellido" required>
        <input type="text" id="instagram" placeholder="Instagram (sin @)" required>
        <button type="submit" id="btnRegistro">Registrarme</button>
    </form>

    <a href="admin.html" class="admin-link">Acceso admin</a>
</div>

<div class="modal" id="modalExito">
    <div class="modal-content">
        <h2>🎉 Registro realizado</h2>
        <p>Tu registro para <span class="eventoNombreModal">ToxiFezt</span> fue exitoso.</p>
        <p>Nos vemos en la fiesta.</p>
        <button id="cerrarModal">Cerrar</button>
    </div>
</div>

<div class="modal" id="modalLleno">
    <div class="modal-content">
        <h2>🚫 Registro cerrado</h2>
        <p id="mensajeLleno">Los lugares ya fueron ocupados.</p>
        <p>Gracias por tu interés.</p>
        <button id="cerrarLleno">Entendido</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script type="module" src="js/script.js"></script>

</body>
</html>
